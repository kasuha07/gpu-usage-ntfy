[monitor]
# 采样间隔（秒）
# 注意：支持热重载，修改并保存后会在下一次采样周期生效
# 注意：程序固定使用 UTC+8 作为日志与 quiet_hours 判定时区
interval_seconds = 10
# 启动时发送系统通知（Ctrl+C 退出时仍会发送退出通知）
send_startup_notification = true
# 输出每次采样日志
sample_log = true

[ntfy]
# 可替换为自建 ntfy 服务器地址
server = "https://ntfy.sh"
topic = "gpu-usage-alerts"
# 二选一：直接写 token 或从环境变量读取（推荐 token_env）
# 若使用 ntfy.sh 公共 topic，通常无需 token（避免 403）
# token = "tk_xxx"
token_env = "NTFY_TOKEN"
# 默认要求 HTTPS；仅在受信任内网调试时才显式放开
# allow_insecure_http = true
title_prefix = "GPU Monitor"
# ntfy 优先级：1(最低) ~ 5(最高)
priority = 4
tags = ["gpu", "monitor"]
timeout_seconds = 10
# 发送失败时重试次数（包含首次尝试）
max_retries = 3
# 首次重试退避毫秒（后续指数退避）
retry_initial_backoff_millis = 500

# 免打扰时间段（可配置多个；支持跨日）
[[quiet_hours]]
start = "22:00"
end = "08:00"

[policy]
# GPU 空闲判定上限（%）：当前利用率 <= 此值视为“空闲”
gpu_util_percent = 20.0
# 显存空闲判定上限（%）：当前显存占用 <= 此值视为“空闲”
memory_util_percent = 20.0
# any: 任一指标满足空闲判定即触发；both: 两者都满足空闲判定才触发
trigger_mode = "both"
# 连续满足空闲判定样本数达到后触发通知
trigger_after_consecutive_samples = 3
# 连续不满足空闲判定样本数达到后触发恢复通知（表示 GPU 再次变忙）
recovery_after_consecutive_samples = 2
# 连续空闲期间是否重复提醒（false: 仅首次空闲通知，避免频繁打扰）
repeat_idle_notifications = false
# 空闲通知重复发送冷却时间（秒）
# 仅在 repeat_idle_notifications = true 时生效
resend_cooldown_seconds = 3600
# 是否发送恢复通知
send_recovery = true
# 是否在 quiet_hours 内抑制通知
suppress_in_quiet_hours = true

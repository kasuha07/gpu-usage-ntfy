[monitor]
# 采样间隔（秒）
interval_seconds = 10
# 启动/退出时发送系统通知
send_startup_notification = true
# 输出每次采样日志
sample_log = true

[ntfy]
# 可替换为自建 ntfy 服务器地址
server = "https://ntfy.sh"
topic = "gpu-usage-alerts"
# 二选一：直接写 token 或从环境变量读取
# token = "tk_xxx"
token_env = "NTFY_TOKEN"
title_prefix = "GPU Monitor"
# ntfy 优先级：1(最低) ~ 5(最高)
priority = 4
tags = ["gpu", "monitor"]
timeout_seconds = 10
# 发送失败时重试次数（包含首次尝试）
max_retries = 3
# 首次重试退避毫秒（后续指数退避）
retry_initial_backoff_millis = 500

# 免打扰时间段（可配置多个；支持跨日）
[[quiet_hours]]
start = "22:00"
end = "08:00"

[policy]
# GPU 核心利用率阈值（%）
gpu_util_percent = 90.0
# 显存利用率阈值（%）
memory_util_percent = 90.0
# any: 任一指标超阈值触发；both: 两者都超阈值才触发
trigger_mode = "any"
# 连续超阈值样本数达到后触发告警
trigger_after_consecutive_samples = 3
# 连续恢复样本数达到后触发恢复通知
recovery_after_consecutive_samples = 2
# 告警重复发送冷却时间（秒）
resend_cooldown_seconds = 1800
# 是否发送恢复通知
send_recovery = true
# 是否在 quiet_hours 内抑制通知
suppress_in_quiet_hours = true

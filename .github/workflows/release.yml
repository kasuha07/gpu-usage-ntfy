name: Release

on:
  push:
    tags:
      - "v*"
      - "gpu-usage-ntfy-v*"
  workflow_dispatch:
    inputs:
      tag:
        description: "Existing tag to release (for example: v0.1.1 or gpu-usage-ntfy-v0.2.0)"
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Resolve release metadata
        id: meta
        shell: bash
        run: |
          if [[ "${GITHUB_REF}" == refs/tags/* ]]; then
            tag="${GITHUB_REF#refs/tags/}"
          else
            tag="${{ inputs.tag }}"
          fi

          if [[ -z "${tag}" ]]; then
            echo "Tag must not be empty" >&2
            exit 1
          fi

          package_tag="${tag#gpu-usage-ntfy-}"
          if [[ "${tag}" != v* && "${tag}" != gpu-usage-ntfy-v* ]]; then
            echo "Tag must start with v or gpu-usage-ntfy-v, got: ${tag}" >&2
            exit 1
          fi

          package_dir="gpu-usage-ntfy-${package_tag}-x86_64-unknown-linux-gnu"
          archive="${package_dir}.tar.gz"
          checksum="${archive}.sha256"

          echo "tag=${tag}" >> "${GITHUB_OUTPUT}"
          echo "package_tag=${package_tag}" >> "${GITHUB_OUTPUT}"
          echo "package_dir=${package_dir}" >> "${GITHUB_OUTPUT}"
          echo "archive=${archive}" >> "${GITHUB_OUTPUT}"
          echo "checksum=${checksum}" >> "${GITHUB_OUTPUT}"

      - name: Checkout source
        uses: actions/checkout@v6
        with:
          ref: ${{ steps.meta.outputs.tag }}

      - name: Install Rust toolchain
        uses: dtolnay/rust-toolchain@stable

      - name: Cache cargo artifacts
        uses: Swatinem/rust-cache@v2

      - name: Create GitHub release if missing
        uses: actions/github-script@v8
        env:
          TAG: ${{ steps.meta.outputs.tag }}
        with:
          script: |
            const tag = process.env.TAG;
            const isSupportedTag =
              typeof tag === 'string' &&
              (tag.startsWith('v') || tag.startsWith('gpu-usage-ntfy-v'));

            if (!isSupportedTag) {
              core.setFailed(
                `Tag must start with v or gpu-usage-ntfy-v. Received: ${tag ?? '(empty)'}`,
              );
              return;
            }

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`Tag ${tag} does not exist.`);
                return;
              }
              throw error;
            }

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Release for ${tag} already exists.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
            });

            core.info(`Created release for ${tag}.`);

      - name: Build release binary
        run: cargo build --release --locked

      - name: Package release artifacts
        id: package
        shell: bash
        run: |
          pkg_dir="${{ steps.meta.outputs.package_dir }}"
          mkdir -p "${pkg_dir}"

          cp target/release/gpu-usage-ntfy "${pkg_dir}/"
          cp README.md LICENSE config.example.toml "${pkg_dir}/"

          tar -czf "${{ steps.meta.outputs.archive }}" "${pkg_dir}"
          sha256sum "${{ steps.meta.outputs.archive }}" > "${{ steps.meta.outputs.checksum }}"

      - name: Upload workflow artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ${{ steps.meta.outputs.package_dir }}
          path: |
            ${{ steps.meta.outputs.archive }}
            ${{ steps.meta.outputs.checksum }}

      - name: Upload release assets
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release upload "${{ steps.meta.outputs.tag }}" \
            "${{ steps.meta.outputs.archive }}" \
            "${{ steps.meta.outputs.checksum }}" \
            --clobber

name: Release

on:
  push:
    tags:
      - "v*"
  workflow_dispatch:
    inputs:
      tag:
        description: Existing tag to release (for manual runs)
        required: true
        type: string

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - name: Create GitHub release
        uses: actions/github-script@v7
        with:
          script: |
            const tag = context.eventName === 'push'
              ? context.ref.replace('refs/tags/', '')
              : context.payload.inputs?.tag;

            if (!tag || !tag.startsWith('v')) {
              core.setFailed(`Tag must start with v. Received: ${tag ?? '(empty)'}`);
              return;
            }

            try {
              await github.rest.git.getRef({
                owner: context.repo.owner,
                repo: context.repo.repo,
                ref: `tags/${tag}`,
              });
            } catch (error) {
              if (error.status === 404) {
                core.setFailed(`Tag ${tag} does not exist.`);
                return;
              }
              throw error;
            }

            try {
              await github.rest.repos.getReleaseByTag({
                owner: context.repo.owner,
                repo: context.repo.repo,
                tag,
              });
              core.info(`Release for ${tag} already exists.`);
              return;
            } catch (error) {
              if (error.status !== 404) {
                throw error;
              }
            }

            await github.rest.repos.createRelease({
              owner: context.repo.owner,
              repo: context.repo.repo,
              tag_name: tag,
              name: tag,
              generate_release_notes: true,
            });

            core.info(`Created release for ${tag}.`);
